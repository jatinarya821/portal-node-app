<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <p class="eyebrow">Court e-Portal</p>
      <h1>Sign In</h1>
      <p class="small">Login with your assigned user account to continue.</p>

      <form id="login-form" class="login-form">
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email" required autocomplete="username" placeholder="name@court.local" />

        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" required autocomplete="current-password" placeholder="Enter password" />

        <button type="submit">Sign In</button>
      </form>

      <p id="login-message" class="login-message" role="status" aria-live="polite"></p>
      <p id="login-error" class="login-error" role="alert"></p>

      <section class="demo-users" aria-label="Demo users">
        <h2>Demo Users</h2>
        <div id="demo-users-list" class="demo-users-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="/public/js/login.js"></script>
</body>
</html>
